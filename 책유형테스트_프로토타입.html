<style>
  :root{
    --bg:#faf8f3; --card:#ffffff; --ink:#2b2a26; --sub:#77746b; --line:#e7e2d6; --accent:#c96b4e;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--ink);}
  #app{max-width:640px;margin:0 auto;padding:32px 20px 80px;min-height:100vh;}
  .serif{font-family:"Noto Serif KR","Georgia",serif;}
  .brand{font-size:13px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px;text-align:center;}
  .hero{text-align:center;padding:40px 0 20px;}
  .hero h1{font-size:26px;font-weight:600;margin:0 0 14px;line-height:1.4;}
  .hero p{font-size:15px;color:var(--sub);line-height:1.7;margin:0 auto 28px;max-width:420px;}
  .btn{display:inline-block;padding:14px 28px;background:var(--ink);color:#fff;border:none;border-radius:999px;font-size:15px;font-weight:500;cursor:pointer;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn:active{transform:scale(.98);}
  .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .progress{height:4px;background:var(--line);border-radius:4px;margin-bottom:36px;overflow:hidden;}
  .progress-bar{height:100%;background:var(--accent);transition:width .25s;}
  .qmeta{font-size:12px;color:var(--sub);margin-bottom:10px;}
  .qtext{font-size:19px;line-height:1.6;margin:0 0 32px;font-weight:500;}
  .scale{display:flex;justify-content:space-between;gap:8px;margin-bottom:36px;}
  .scale button{flex:1;aspect-ratio:1/1;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:13px;color:var(--sub);}
  .scale button.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .scalelabels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:36px;}
  .navrow{display:flex;justify-content:space-between;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .resulthead{text-align:center;padding:20px 0 8px;}
  .resulthead .code{font-size:12px;color:var(--sub);letter-spacing:.08em;}
  .resulthead h1{font-size:30px;margin:8px 0 12px;}
  .resulthead p{font-size:14px;color:var(--sub);max-width:420px;margin:0 auto;line-height:1.7;}
  .gauges{display:flex;flex-direction:column;gap:26px;margin:28px 0;}
  .gauge-pct{text-align:center;font-size:15px;font-weight:700;margin-bottom:10px;}
  .gauge-track{position:relative;height:6px;border-radius:4px;margin-bottom:8px;}
  .gauge-dot{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.25);transform:translate(-50%,-50%);}
  .gauge-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--sub);}
  .sectiontitle{font-size:13px;font-weight:600;color:var(--sub);margin:28px 0 12px;}
  .longdesc{font-size:14.5px;line-height:1.8;color:var(--ink);margin:0;}
  .traitgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .traitcol{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .traitcol h3{font-size:12px;margin:0 0 12px;color:var(--sub);}
  .traitcol.strength h3{color:#4a7d5c;}
  .traitcol.weakness h3{color:var(--accent);}
  .traititem{margin-bottom:12px;}
  .traititem:last-child{margin-bottom:0;}
  .traititem .tt{font-size:12.5px;font-weight:600;margin-bottom:3px;}
  .traititem .dd{font-size:11.5px;color:var(--sub);line-height:1.55;}
  .envbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;color:var(--sub);}
  .envbox b{color:var(--ink);}
  .charbox{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .charbox .badge{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif KR",serif;font-weight:700;font-size:18px;flex-shrink:0;}
  .charbox .info b{font-size:14px;}
  .charbox .info p{margin:2px 0 0;font-size:12px;color:var(--sub);}
  .matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .matchcard{border-radius:14px;padding:14px;text-align:center;}
  .matchcard.good{background:#eef4ee;border:1px solid #cfe0cf;}
  .matchcard.bad{background:#f5ecec;border:1px solid #e2cccc;}
  .matchcard .mlabel{font-size:11px;color:var(--sub);margin-bottom:6px;}
  .matchcard .mname{font-size:14px;font-weight:600;}
  .matchcard .mcode{font-size:11px;color:var(--sub);margin-top:2px;}
  .books{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
  .book{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .book .cover{position:relative;aspect-ratio:3/4;border-radius:6px;margin-bottom:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Noto Serif KR",serif;font-size:26px;font-weight:700;}
  .book .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  .book .cat{font-size:10px;color:var(--accent);margin:0 0 4px;}
  .book .title{font-size:12.5px;font-weight:600;margin:0 0 2px;line-height:1.35;}
  .book .author{font-size:11.5px;color:var(--sub);margin:0;}
  .book .buylink{display:block;margin-top:8px;font-size:11px;font-weight:600;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:999px;padding:5px 0;text-align:center;}
  .book .buylink:active{opacity:.7;}
  .sharecard{position:relative;width:280px;aspect-ratio:1/1;margin:0 auto;border-radius:20px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;}
  .sharecard .tag{font-size:11px;opacity:.75;letter-spacing:.06em;margin-bottom:6px;}
  .sharecard .name{font-size:26px;font-weight:700;line-height:1.3;}
  .sharecard .desc{font-size:13px;opacity:.85;line-height:1.6;}
  .sharecard .foot{display:flex;justify-content:space-between;font-size:11px;opacity:.7;}
  .mascot-wrap{display:flex;justify-content:center;margin-bottom:6px;}
  .sharecard .mascot-wrap{position:absolute;top:16px;right:16px;margin:0;}
  .mascot-img{border-radius:50%;object-fit:cover;background:var(--line);}
  .mascot-lg{width:132px;height:132px;}
  .mascot-sm{width:60px;height:60px;}
  @media (max-width:420px){ .books{grid-template-columns:1fr 1fr 1fr;} }
</style>
</head>

/* ---------- 유형 마스코트 (축 코드 기반 절차적 SVG, 캐릭터 이미지 로드 실패 시 폴백) ---------- */
function mascotSVG(code, color, size){
  size = size || 100;
  const ink = '#332b22';
  const c1 = code[0], c2 = code[1], c3 = code[2], c4 = code[3];
  const eyes = c1 === 'F'
    ? `<circle cx="42" cy="52" r="6" fill="${ink}"/><circle cx="78" cy="52" r="6" fill="${ink}"/>`
    : `<rect x="33" y="48" width="20" height="6" rx="3" fill="${ink}"/><rect x="67" y="48" width="20" height="6" rx="3" fill="${ink}"/>`;
  const mouth = c2 === 'P'
    ? `<path d="M45 70 Q60 87 75 70" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/>`
    : `<path d="M47 73 Q60 77 73 73" stroke="${ink}" stroke-width="5" fill="none" stroke-linecap="round"/>`;
  const accessory = c3 === 'W'
    ? `<path d="M92 26 c4-6 13-6 15 1 c2 7 -7 13 -15 20 c-8-7-17-13-15-20 c2-7 11-7 15-1z" fill="#e08a7d"/>`
    : `<path d="M90 16 l4 9 9 3 -9 3 -4 9 -4-9 -9-3 9-3z" fill="#f4c95d"/>`;
  const motion = c4 === 'R'
    ? `<line x1="4" y1="48" x2="20" y2="48" stroke="${ink}" stroke-width="3" stroke-linecap="round" opacity=".45"/><line x1="0" y1="60" x2="18" y2="60" stroke="${ink}" stroke-width="3" stroke-linecap="round" opacity=".3"/>`
    : `<path d="M16 94 q8-16 22-11" stroke="#3f7d5c" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 120 120" width="${size}" height="${size}" role="img" aria-label="${code} 유형 마스코트">
    <circle cx="60" cy="60" r="52" fill="${color}"/>
    ${motion}${eyes}${mouth}${accessory}
  </svg>`;
}

/* ---------- 도서 표지 불러오기 ----------
   1순위: 알라딘 Open API (국내 도서 커버리지 좋음, /aladin-api 프록시 경유)
   2순위: 구글 북스 API (키 불필요, 국내 도서는 커버리지 약함)
   둘 다 실패하면 이니셜 타일 그대로 유지

   [중요] TTBKey는 더 이상 이 파일에 없음 — server.js에서만 보관하고
   서버가 알라딘에 대신 요청해줌. 그래서 이 프록시가 있어야만
   알라딘 표지를 가져올 수 있음 (server.js 실행 + http://localhost:3000 접속 필요).
   서버 없이 file://로 열면 알라딘은 건너뛰고 구글 북스만 시도함. ---------- */

function showCover(elId, url){
  const el = document.getElementById(elId);
  if(!el) return;
  const img = el.querySelector('img');
  img.onload = () => { img.style.display = 'block'; const span = el.querySelector('span'); if(span) span.style.display = 'none'; };
  img.src = url;
}

async function aladinSearch(query, queryType){
  const url = `/aladin-api?query=${encodeURIComponent(query)}&queryType=${queryType}`;
  const res = await fetch(url);
  if(!res.ok) return null;
  const data = await res.json();
  return data.cover || null;
}

async function loadCoverAladin(title, author){
  if(location.protocol.indexOf('http') !== 0) return null; // 서버(프록시) 없이는 알라딘 호출 불가
  // 1차: 제목+저자 통합검색, 2차: 제목만으로 재시도(시리즈명 등 저자 매칭이 애매한 경우 대비)
  const combined = await aladinSearch(`${title} ${author}`, 'Keyword');
  if(combined) return combined;
  return await aladinSearch(title, 'Title');
}

async function loadCoverGoogle(title, author){
  const q = encodeURIComponent(`intitle:${title} inauthor:${author}`);
  const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
  if(!res.ok) return null;
  const data = await res.json();
  const thumb = data.items && data.items[0] && data.items[0].volumeInfo.imageLinks && data.items[0].volumeInfo.imageLinks.thumbnail;
  return thumb ? thumb.replace('http:', 'https:') : null;
}

async function loadCover(elId, title, author){
  try{
    const aladin = await loadCoverAladin(title, author);
    if(aladin){ showCover(elId, aladin); return; }
    console.warn('[표지] 알라딘에서 결과 없음:', title);
  }catch(e){ console.warn('[표지] 알라딘 호출 실패(CORS/네트워크일 가능성):', title, e); }
  try{
    const google = await loadCoverGoogle(title, author);
    if(google){ showCover(elId, google); return; }
    console.warn('[표지] 구글 북스에서도 결과 없음:', title);
  }catch(e){ console.warn('[표지] 구글 북스 호출 실패:', title, e); }
}

/* ---------- 채점 ---------- */
function computeResult(){
  const sums = {F:0,G:0,P:0,T:0,W:0,S:0,R:0,D:0};
  const fives = {F:0,G:0,P:0,T:0,W:0,S:0,R:0,D:0};
  QUESTIONS.forEach((q,i)=>{
    const v = answers[i];
    sums[q.pole] += v;
    if(v === 5) fives[q.pole]++;
  });
  function pick(a,b){
    if(sums[a] !== sums[b]) return sums[a] > sums[b] ? a : b;
    if(fives[a] !== fives[b]) return fives[a] > fives[b] ? a : b;
    return a;
  }
  let code = '';
  AXES.forEach(ax => { code += pick(ax.left, ax.right); });
  return {code, sums};
}

  document.querySelectorAll('#scaleRow button').forEach(btn=>{
    btn.onclick = () => {
      answers[current] = Number(btn.dataset.v);

function goNext(fromScale){
  if(answers[current] === 0) return;
  if(current === QUESTIONS.length - 1){
    current = QUESTIONS.length;
    renderResult();
  } else {
    current++;
    renderQuestion();
  }
}

function renderResult(){
  const {code, sums} = computeResult();
  showResult(code, sums, false);
}

    </div>

    <div class="btnrow" style="margin-top:24px;">
      ${shared ? `<button class="btn" id="startBtn2">나도 테스트하기</button>` : `
        <button class="btn ghost" id="saveImgBtn">이미지로 저장</button>
        <button class="btn ghost" id="copyLinkBtn">링크 복사</button>
        <button class="btn" id="restartBtn">다시 하기</button>
      `}
    </div>`;

  if(shared){
    document.getElementById('startBtn2').onclick = () => {
      answers = new Array(QUESTIONS.length).fill(0);
      current = 0;
      history.replaceState(null, '', location.pathname); // 주소에서 ?type= 제거
      renderQuestion();
    };
  } else {
    document.getElementById('restartBtn').onclick = () => {
      answers = new Array(QUESTIONS.length).fill(0);
      current = -1;
      renderIntro();
    };
    document.getElementById('copyLinkBtn').onclick = () => {
      const url = location.href.split('?')[0] + '?type=' + code;
      navigator.clipboard?.writeText(url).then(()=>{
        document.getElementById('copyLinkBtn').textContent = '복사됨';
        setTimeout(()=>{ document.getElementById('copyLinkBtn').textContent = '링크 복사'; }, 1500);
      });
    };
    document.getElementById('saveImgBtn').onclick = () => saveShareImage(type, code);
  }

  // 로컬에 미리 받아둔 표지가 없는 책만 실시간 API로 시도
  type.books.forEach((b, i) => {
    const local = LOCAL_COVERS[code] && LOCAL_COVERS[code][i];
    if(!local) loadCover(`cover-${i}`, b.title, b.author);
  });
}

/* ---------- 공유 이미지 저장 (canvas) ---------- */
function loadImageEl(url){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

async function saveShareImage(type, code){
  const size = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = type.color;
  ctx.fillRect(0,0,size,size);

  // 캐릭터 이미지를 원형으로 그려보고, CORS 등으로 실패하면 절차적 마스코트로 폴백
  const mx = size - 170, my = 70, mr = 90;
  try{
    const img = await loadImageEl(CHARACTERS[code]);
    ctx.save();
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(img, mx-mr, my-mr, mr*2, mr*2);
    ctx.restore();
  }catch(e){
    drawMascot(ctx, mx, my, mr, code);
  }

  ctx.fillStyle = '#332b22';
  ctx.font = '400 30px sans-serif';
  ctx.fillText('TEXT TYPE · ' + code, 80, 130);

  ctx.font = '700 84px serif';
  wrapText(ctx, type.name, 80, 260, 900, 96);

  ctx.font = '400 34px sans-serif';
  wrapText(ctx, type.desc, 80, size - 220, 900, 46);

  ctx.font = '400 26px sans-serif';
  ctx.fillText('책 유형 테스트', 80, size - 80);
  ctx.textAlign = 'right';
  ctx.fillText('#텍스트힙', size - 80, size - 80);
  ctx.textAlign = 'left';

  let dataUrl;
  try{
    dataUrl = canvas.toDataURL('image/png');
  }catch(e){
    // 캔버스가 오염된 경우(taint) 절차적 마스코트로 다시 그려서라도 다운로드는 되게 함
    ctx.clearRect(mx-mr-4, my-mr-4, mr*2+8, mr*2+8);
    drawMascot(ctx, mx, my, mr, code);
    dataUrl = canvas.toDataURL('image/png');
  }

  const link = document.createElement('a');
  link.download = `text-type-${code}.png`;
  link.href = dataUrl;
  link.click();
}

function drawMascot(ctx, cx, cy, r, code){
  const ink = '#332b22';
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = ink;
  const eyeDx = r*0.34, eyeDy = -r*0.05;
  if(code[0] === 'F'){
    ctx.beginPath(); ctx.arc(cx-eyeDx, cy+eyeDy, r*0.09, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+eyeDx, cy+eyeDy, r*0.09, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillRect(cx-eyeDx-r*0.16, cy+eyeDy-r*0.04, r*0.32, r*0.08);
    ctx.fillRect(cx+eyeDx-r*0.16, cy+eyeDy-r*0.04, r*0.32, r*0.08);
  }

  ctx.strokeStyle = ink; ctx.lineWidth = r*0.06; ctx.lineCap = 'round';
  ctx.beginPath();
  if(code[1] === 'P'){
    ctx.moveTo(cx-r*0.28, cy+r*0.28);
    ctx.quadraticCurveTo(cx, cy+r*0.55, cx+r*0.28, cy+r*0.28);
  } else {
    ctx.moveTo(cx-r*0.24, cy+r*0.32);
    ctx.quadraticCurveTo(cx, cy+r*0.4, cx+r*0.24, cy+r*0.32);
  }
  ctx.stroke();
  ctx.restore();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  let curY = y;
  words.forEach(word => {
    const test = line + word + ' ';
    if(ctx.measureText(test).width > maxWidth && line !== ''){
      ctx.fillText(line, x, curY);
      line = word + ' ';
      curY += lineHeight;
    } else {
      line = test;
    }
  });
  ctx.fillText(line, x, curY);
}

/* ---------- 시작 ---------- */
(async function boot(){
  await Promise.all([loadCoversManifest(), loadLinksManifest()]);
  const sharedCode = new URLSearchParams(location.search).get('type');
  if(sharedCode && TYPES[sharedCode]){
    // 공유 링크로 들어온 경우: 내 답변이 없으니 게이지 없이 결과만 보여줌
    showResult(sharedCode, null, true);
  } else {
    renderIntro();
  }
})();
</script>
