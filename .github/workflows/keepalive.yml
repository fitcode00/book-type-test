name: Keep Render awake

# Render 무료 플랜은 15분간 요청이 없으면 서버가 잠들고, 다음 요청 때 30~60초 정도 깨는 시간이 걸림.
# 10분마다 사이트에 요청을 보내서 잠들지 않게 유지 (무료, GitHub Actions 사용).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: curl -sS -o /dev/null -w "status: %{http_code}\n" https://book-type-test.onrender.com/ || true
